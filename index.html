<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARASHI Request Support</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #0f0f14; color: white; padding: 20px; }
        .card { background: #1a1a24; border-radius: 15px; padding: 25px; max-width: 450px; margin: auto; border: 1px solid #A663FF; }
        .btn { display: block; width: 100%; padding: 14px; margin: 12px 0; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; text-decoration: none; font-size: 1rem; }
        .btn-gold { background: linear-gradient(45deg, #FFD700, #FFA500); color: #000; }
        .btn-secondary { background: #424252; color: white; }
        .instruction { font-size: 0.85rem; color: #9a9aab; margin-top: 25px; text-align: left; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px; }
        .highlight { color: #FFD700; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h1>ARASHI チャンネル申請支援</h1>
    
    <a class="btn btn-gold" href="javascript:(async function(){const c={fandom:'Fans of ARASHI',artist:'https://open.spotify.com/playlist/6JM2mvYNjS96KW074CQCMd?si=531cf2c23049481c」',stations:['arashistation5','yukino5','siosato4','erinouehara','rantan31041126','sayori','kasuteranote'],message:'We love ARASHI! Please create a custom channel.'};const setVal=(id,val)=>{const el=document.getElementById(id);if(el){el.value=val;el.dispatchEvent(new Event('input',{bubbles:true}));}};setVal('fandom',c.fandom);setVal('artistName',c.artist);setVal('message',c.message);const stationInput=document.getElementById('add-team-members');const addBtn=stationInput?.closest('.grid')?.querySelector('button');if(stationInput&&addBtn){for(const name of c.stations){stationInput.value=name;stationInput.dispatchEvent(new Event('input',{bubbles:true}));addBtn.click();await new Promise(r=>setTimeout(r,600));}}alert('入力完了！');})();">【長押し】してブックマークに保存</a>

    <a href="https://www.stationhead.com/p/request-channel" target="_blank" class="btn btn-secondary">2. 申請サイトを開く</a>

    <div class="instruction">
        <strong>【超重要】使いかた:</strong><br>
        1. 上の<span class="highlight">黄色のボタンを長押し</span>して「リンクをコピー」ではなく<b>「ブックマークに追加（またはリンクを保存）」</b>を選びます。<br>
        2. 申請サイトへ移動します。<br>
        3. サイトが開いたら、アドレスバーに<b>保存したブックマークの名前</b>（ARASHI チャンネル申請支援）を打ち込み、出てきた候補をタップしてください。<br>
        <br>
        <small>※これでブラウザのセキュリティを回避して自動入力が発動します！</small>
    </div>
</div>

</body>
</html>
